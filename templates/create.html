<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Ticket — Datastraw CRM</title>
  <meta name="description" content="Submit a new customer support ticket to the Datastraw CRM system." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: { brand: { 500:'#4f6ef7', 600:'#3b5bf5', 700:'#2c48d8' } },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.35s ease-out',
          },
          keyframes: {
            fadeIn: { from:{ opacity:'0' }, to:{ opacity:'1' } },
            slideUp: { from:{ transform:'translateY(12px)', opacity:'0' }, to:{ transform:'translateY(0)', opacity:'1' } },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f1117; color: #e2e8f0; }
    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    .form-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: #64748b; }
    .form-input:focus { outline: none; border-color: #4f6ef7; box-shadow: 0 0 0 3px rgba(79,110,247,0.2); }
    .form-input.error { border-color: #f87171; box-shadow: 0 0 0 3px rgba(248,113,113,0.2); }
    .submit-btn { transition: all 0.2s; }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,110,247,0.4); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #form-error { display: none; animation: fadeIn 0.3s ease-out; }
    label { color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
  </style>
</head>

<body class="font-sans min-h-screen">

  <!-- ── Navbar ─────────────────────────────────────────────────────── -->
  <nav class="glass border-b border-white/5 sticky top-0 z-30">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 flex items-center h-16 gap-3">
      <a href="/" id="nav-back" class="flex items-center gap-1.5 text-slate-400 hover:text-white transition-colors text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Dashboard
      </a>
      <span class="text-slate-600">/</span>
      <span class="text-white font-medium text-sm">New Ticket</span>
    </div>
  </nav>

  <!-- ── Form ───────────────────────────────────────────────────────── -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-10">

    <div class="mb-8 animate-fade-in">
      <h1 class="text-2xl sm:text-3xl font-bold text-white mb-1">Create Support Ticket</h1>
      <p class="text-slate-400 text-sm">Fill in the customer details and describe the issue below.</p>
    </div>

    <!-- Error banner -->
    <div id="form-error" class="glass border border-red-500/30 bg-red-500/10 text-red-400 rounded-xl px-5 py-4 mb-6 flex items-start gap-3">
      <svg class="w-5 h-5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p id="form-error-text" class="text-sm"></p>
    </div>

    <form id="create-form" class="glass rounded-2xl p-6 sm:p-8 space-y-6 animate-slide-up" novalidate>

      <div class="grid sm:grid-cols-2 gap-6">
        <!-- Customer Name -->
        <div class="space-y-2">
          <label for="customer-name">Customer Name <span class="text-red-400">*</span></label>
          <input id="customer-name" name="customer_name" type="text" required placeholder="Rahul Sharma"
                 class="form-input w-full px-4 py-3 rounded-xl text-sm" />
          <p class="hidden text-red-400 text-xs" id="err-name">Name is required.</p>
        </div>
        <!-- Customer Email -->
        <div class="space-y-2">
          <label for="customer-email">Customer Email <span class="text-red-400">*</span></label>
          <input id="customer-email" name="customer_email" type="email" required placeholder="rahul@example.com"
                 class="form-input w-full px-4 py-3 rounded-xl text-sm" />
          <p class="hidden text-red-400 text-xs" id="err-email">Valid email is required.</p>
        </div>
      </div>

      <!-- Subject -->
      <div class="space-y-2">
        <label for="subject">Subject <span class="text-red-400">*</span></label>
        <input id="subject" name="subject" type="text" required placeholder="e.g. Order not received, Billing issue…"
               class="form-input w-full px-4 py-3 rounded-xl text-sm" />
        <p class="hidden text-red-400 text-xs" id="err-subject">Subject is required.</p>
      </div>

      <!-- Description -->
      <div class="space-y-2">
        <label for="description">Description <span class="text-slate-600 font-normal normal-case">(optional)</span></label>
        <textarea id="description" name="description" rows="5" placeholder="Describe the issue in detail…"
                  class="form-input w-full px-4 py-3 rounded-xl text-sm resize-none"></textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-between pt-2 border-t border-white/5">
        <a href="/" class="text-sm text-slate-400 hover:text-white transition-colors">Cancel</a>
        <button id="submit-btn" type="submit"
                class="submit-btn inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-medium text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Submit Ticket
        </button>
      </div>

    </form>
  </main>

  <script src="/static/js/create.js"></script>
</body>
</html>
